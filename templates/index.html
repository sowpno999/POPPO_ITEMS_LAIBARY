<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>POPPO ITEMS LIBRARY - Free Fire Item Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 50%, #0a0a2a, #050510);
            position: relative;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .container.visible {
            opacity: 1;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a2a, #050510);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .loader {
            text-align: center;
        }

        .skull-loader {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
            animation: skullFloat 1s ease-in-out infinite;
        }

        .skull-loader svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px #a855f7);
        }

        @keyframes skullFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loader-text {
            color: #c084fc;
            font-size: 18px;
            letter-spacing: 2px;
            animation: textPulse 1.5s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px #a855f7; }
        }

        .loader-progress {
            width: 200px;
            height: 3px;
            background: rgba(168, 85, 247, 0.2);
            border-radius: 3px;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            width: 0%;
            animation: progress 2s ease-out;
            border-radius: 3px;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* Header with Rotating Skulls - Fixed for mobile */
        .header {
            text-align: center;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: nowrap;
        }

        .rotating-skull {
            width: 50px;
            height: 50px;
            flex-shrink: 0;
            animation: rotateSkull 4s linear infinite;
            filter: drop-shadow(0 0 8px #a855f7);
        }

        .rotating-skull-left {
            animation: rotateSkullLeft 4s linear infinite;
        }

        .rotating-skull-right {
            animation: rotateSkullRight 4s linear infinite;
        }

        @keyframes rotateSkullLeft {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        @keyframes rotateSkullRight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .rotating-skull svg {
            width: 100%;
            height: 100%;
        }

        .glow-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: rgba(192, 132, 252, 0.7);
            margin-top: 5px;
            font-size: 0.8rem;
            text-align: center;
        }

        .search-section {
            background: rgba(20, 10, 40, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 180px;
            padding: 12px 16px;
            background: rgba(10, 5, 20, 0.8);
            border: 2px solid rgba(168, 85, 247, 0.4);
            border-radius: 50px;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #c084fc;
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
        }

        .input-group input::placeholder {
            color: rgba(192, 132, 252, 0.5);
            font-size: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(124, 58, 237, 0.6);
        }

        .btn-reset {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(107, 114, 128, 0.4);
        }

        .working-id {
            text-align: center;
            margin-top: 12px;
            font-size: 10px;
            color: rgba(192, 132, 252, 0.6);
        }

        .search-loading {
            text-align: center;
            padding: 60px;
            background: rgba(20, 10, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .search-loader {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        .search-loader svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px #a855f7);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .search-loading-text {
            color: #c084fc;
            font-size: 14px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px 0;
        }

        .item-card {
            background: rgba(20, 10, 40, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(192, 132, 252, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .item-image {
            width: 100%;
            height: 160px;
            object-fit: contain;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(168, 85, 247, 0.1));
            padding: 15px;
        }

        .item-name {
            padding: 15px 12px;
            font-weight: bold;
            font-size: 13px;
            color: white;
            text-align: center;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-detail-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .item-detail-loader {
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        .item-detail-loader svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px #a855f7);
        }

        .item-detail-loading-text {
            color: #c084fc;
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 10, 40, 0.98), rgba(10, 5, 20, 0.98));
            backdrop-filter: blur(20px);
            border: 2px solid rgba(168, 85, 247, 0.5);
            border-radius: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            color: #c084fc;
            transition: all 0.3s;
            z-index: 1;
        }

        .modal-close:hover {
            color: #ef4444;
            transform: rotate(90deg);
        }

        .modal-image {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            background: rgba(124, 58, 237, 0.1);
            padding: 25px;
        }

        .modal-details {
            padding: 20px;
        }

        .detail-row {
            padding: 10px 0;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
        }

        .detail-label {
            font-weight: bold;
            color: rgba(192, 132, 252, 0.8);
            font-size: 11px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .detail-value {
            color: white;
            font-size: 14px;
            word-break: break-word;
        }

        .detail-id-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .copy-modal-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-modal-btn:hover {
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            background: rgba(20, 10, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: rgba(192, 132, 252, 0.7);
        }

        .footer {
            text-align: center;
            padding: 25px;
            margin-top: 40px;
            color: rgba(192, 132, 252, 0.4);
            font-size: 10px;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(10, 5, 20, 0.8);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .rotating-skull {
                width: 35px;
                height: 35px;
            }
            
            .glow-text {
                font-size: 1.4rem;
                white-space: normal;
                word-break: keep-all;
            }
            
            .header {
                gap: 8px;
                padding: 20px 10px;
            }
            
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            
            .item-image {
                height: 130px;
                padding: 12px;
            }
            
            .item-name {
                font-size: 11px;
                padding: 10px 8px;
            }
            
            .btn-primary, .btn-reset {
                padding: 10px 16px;
                font-size: 12px;
            }
            
            .input-group input {
                padding: 10px 14px;
                font-size: 12px;
                min-width: 150px;
            }
        }

        @media (max-width: 480px) {
            .rotating-skull {
                width: 28px;
                height: 28px;
            }
            
            .glow-text {
                font-size: 1.1rem;
            }
            
            .header {
                gap: 5px;
            }
            
            .input-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .input-group input {
                width: 100%;
            }
            
            .btn-primary, .btn-reset {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="loadingScreen" class="loading-screen">
        <div class="loader">
            <div class="skull-loader">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10C27 10 10 27 10 50C10 73 27 90 50 90C73 90 90 73 90 50C90 27 73 10 50 10Z" fill="#7c3aed" stroke="#a855f7" stroke-width="2"/>
                    <circle cx="35" cy="45" r="5" fill="white"/>
                    <circle cx="65" cy="45" r="5" fill="white"/>
                    <rect x="45" y="55" width="10" height="15" rx="3" fill="white"/>
                    <path d="M40 70 L60 70" stroke="white" stroke-width="2"/>
                </svg>
            </div>
            <div class="loader-text">LOADING LIBRARY</div>
            <div class="loader-progress">
                <div class="loader-progress-bar"></div>
            </div>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <div id="mainContainer" class="container">
        <div class="header">
            <div class="rotating-skull rotating-skull-left">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10C27 10 10 27 10 50C10 73 27 90 50 90C73 90 90 73 90 50C90 27 73 10 50 10Z" fill="#7c3aed" stroke="#a855f7" stroke-width="1.5"/>
                    <circle cx="35" cy="45" r="5" fill="white"/>
                    <circle cx="65" cy="45" r="5" fill="white"/>
                    <rect x="45" y="55" width="10" height="15" rx="3" fill="white"/>
                    <path d="M40 70 L60 70" stroke="white" stroke-width="2"/>
                </svg>
            </div>
            <h1 class="glow-text">POPPO ITEMS LIBRARY</h1>
            <div class="rotating-skull rotating-skull-right">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10C27 10 10 27 10 50C10 73 27 90 50 90C73 90 90 73 90 50C90 27 73 10 50 10Z" fill="#7c3aed" stroke="#a855f7" stroke-width="1.5"/>
                    <circle cx="35" cy="45" r="5" fill="white"/>
                    <circle cx="65" cy="45" r="5" fill="white"/>
                    <rect x="45" y="55" width="10" height="15" rx="3" fill="white"/>
                    <path d="M40 70 L60 70" stroke="white" stroke-width="2"/>
                </svg>
            </div>
        </div>

        <div class="search-section">
            <div class="input-group">
                <input type="number" id="searchInput" placeholder="Enter Item ID (example: 909000075)">
                <button class="btn-primary" onclick="searchItem()">SEARCH ITEM</button>
                <button class="btn-reset" onclick="resetSearch()">SHOW ALL</button>
            </div>
            <div class="working-id">
                EXAMPLE: 909000075 (Cobra Rising) | 909000081 (Draco's Soul)
            </div>
        </div>

        <div id="itemsGrid" class="items-grid">
            <div class="empty-state">Loading items...</div>
        </div>

        <div class="footer">
            <p>POPPO ITEMS LIBRARY | Premium Free Fire Collection</p>
            <p>Click on any item to view details | Powered by Advanced API</p>
        </div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        canvas.width = width;
        canvas.height = height;
        
        let particles = [];
        let stars = [];
        let orbs = [];
        
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.color = `rgba(168, 85, 247, ${Math.random() * 0.4 + 0.1})`;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }
        
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 1.5;
                this.twinkle = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.03;
            }
            
            update() {
                this.twinkle += this.speed;
                this.currentRadius = this.radius + Math.sin(this.twinkle) * 0.3;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.currentRadius || this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.2 + Math.sin(this.twinkle) * 0.15})`;
                ctx.fill();
            }
        }
        
        class Orb {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 40 + 15;
                this.alpha = Math.random() * 0.08 + 0.03;
                this.speedX = (Math.random() - 0.5) * 0.15;
                this.speedY = (Math.random() - 0.5) * 0.15;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x + this.radius < 0) this.x = width + this.radius;
                if (this.x - this.radius > width) this.x = -this.radius;
                if (this.y + this.radius < 0) this.y = height + this.radius;
                if (this.y - this.radius > height) this.y = -this.radius;
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, `rgba(124, 58, 237, ${this.alpha})`);
                gradient.addColorStop(1, `rgba(168, 85, 247, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        for (let i = 0; i < 80; i++) particles.push(new Particle());
        for (let i = 0; i < 120; i++) stars.push(new Star());
        for (let i = 0; i < 6; i++) orbs.push(new Orb());
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(1, '#050510');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            orbs.forEach(orb => { orb.update(); orb.draw(); });
            stars.forEach(star => { star.update(); star.draw(); });
            particles.forEach(particle => { particle.update(); particle.draw(); });
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });
    </script>

    <script>
        const DEFAULT_IMAGE_URL = "https://www.image2url.com/r2/default/images/1780897574000-3bccf097-63a3-4adf-b8c3-8d44ff686892.png";
        
        let allItems = [];
        let currentDisplayItems = [];

        setTimeout(() => {
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainContainer').classList.add('visible');
            }, 500);
        }, 2000);

        document.addEventListener('DOMContentLoaded', loadItems);

        async function loadItems() {
            try {
                const response = await fetch('/api/items');
                allItems = await response.json();
                currentDisplayItems = [...allItems];
                displayItems();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('itemsGrid').innerHTML = '<div class="empty-state">SERVER CONNECTION ERROR | Make sure server is running</div>';
            }
        }

        function displayItems() {
            const grid = document.getElementById('itemsGrid');
            
            if (currentDisplayItems.length === 0) {
                grid.innerHTML = '<div class="empty-state">NO ITEMS FOUND | Try a different ID or click SHOW ALL</div>';
                return;
            }
            
            grid.innerHTML = currentDisplayItems.map(item => `
                <div class="item-card" onclick="showItemDetailWithLoading(${item.item_id})">
                    <img class="item-image" src="${item.image_url}" 
                         onerror="this.src='${DEFAULT_IMAGE_URL}'"
                         alt="${item.name}">
                    <div class="item-name">${item.name}</div>
                </div>
            `).join('');
        }

        async function searchItem() {
            const input = document.getElementById('searchInput');
            const searchId = parseInt(input.value.trim());
            
            if (!searchId || isNaN(searchId)) {
                alert('Please enter a valid Item ID');
                return;
            }
            
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = `
                <div class="search-loading">
                    <div class="search-loader">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M50 10C27 10 10 27 10 50C10 73 27 90 50 90C73 90 90 73 90 50C90 27 73 10 50 10Z" fill="#7c3aed" stroke="#a855f7" stroke-width="2"/>
                            <circle cx="35" cy="45" r="5" fill="white"/>
                            <circle cx="65" cy="45" r="5" fill="white"/>
                            <rect x="45" y="55" width="10" height="15" rx="3" fill="white"/>
                            <path d="M40 70 L60 70" stroke="white" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="search-loading-text">SEARCHING FOR ITEM ID: ${searchId}</div>
                    <div class="search-loading-text" style="font-size: 12px; margin-top: 10px;">Please wait 3 seconds...</div>
                </div>
            `;
            
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            const foundItem = allItems.find(item => item.item_id === searchId);
            
            if (foundItem) {
                currentDisplayItems = [foundItem];
                displayItems();
            } else {
                try {
                    const response = await fetch('/api/add', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ item_id: searchId })
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        allItems.push(data.item);
                        currentDisplayItems = [data.item];
                        displayItems();
                    } else {
                        grid.innerHTML = `<div class="empty-state">ITEM ID ${searchId} NOT FOUND | Please check the ID and try again</div>`;
                        currentDisplayItems = [];
                    }
                } catch (error) {
                    grid.innerHTML = `<div class="empty-state">ERROR FETCHING ITEM | Please try again later</div>`;
                }
            }
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            currentDisplayItems = [...allItems];
            displayItems();
        }

        async function showItemDetailWithLoading(itemId) {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'item-detail-loading';
            loadingDiv.innerHTML = `
                <div class="item-detail-loader">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 10C27 10 10 27 10 50C10 73 27 90 50 90C73 90 90 73 90 50C90 27 73 10 50 10Z" fill="#7c3aed" stroke="#a855f7" stroke-width="2"/>
                        <circle cx="35" cy="45" r="5" fill="white"/>
                        <circle cx="65" cy="45" r="5" fill="white"/>
                        <rect x="45" y="55" width="10" height="15" rx="3" fill="white"/>
                        <path d="M40 70 L60 70" stroke="white" stroke-width="2"/>
                    </svg>
                </div>
                <div class="item-detail-loading-text">LOADING ITEM DETAILS</div>
                <div class="item-detail-loading-text" style="font-size: 11px; margin-top: 5px;">Please wait 3 seconds...</div>
            `;
            document.body.appendChild(loadingDiv);
            
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            loadingDiv.remove();
            await showItemDetails(itemId);
        }

        async function showItemDetails(itemId) {
            try {
                const response = await fetch(`/api/item/${itemId}`);
                const item = await response.json();
                
                const modalContent = document.getElementById('modalContent');
                modalContent.innerHTML = `
                    <img class="modal-image" src="${item.image_url}" 
                         onerror="this.src='${DEFAULT_IMAGE_URL}'"
                         alt="${item.name}">
                    <div class="modal-details">
                        <div class="detail-row">
                            <div class="detail-label">ITEM NAME</div>
                            <div class="detail-value" style="font-size: 18px; font-weight: bold;">${item.name}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">ITEM ID</div>
                            <div class="detail-value detail-id-wrapper">
                                <span>${item.item_id}</span>
                                <button class="copy-modal-btn" onclick="copyToClipboard('${item.item_id}')">COPY ID</button>
                            </div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">ITEM TYPE</div>
                            <div class="detail-value">${item.item_type}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">RARITY</div>
                            <div class="detail-value">${item.rarity}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">COLLECTION TYPE</div>
                            <div class="detail-value">${item.collection_type}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">UNIQUE ITEM</div>
                            <div class="detail-value">${item.is_unique ? 'YES' : 'NO'}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">DESCRIPTION</div>
                            <div class="detail-value">${item.description || 'Premium Free Fire Item'}</div>
                        </div>
                    </div>
                `;
                
                document.getElementById('itemModal').style.display = 'flex';
            } catch (error) {
                alert('Error loading item details');
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert(`ID ${text} copied to clipboard`);
            }).catch(() => {
                alert('Failed to copy');
            });
        }

        function closeModal() {
            document.getElementById('itemModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('itemModal');
            if (event.target === modal) closeModal();
        }
    </script>
</body>
</html>
